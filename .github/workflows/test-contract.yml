name: Test Soroban Contract

on:
  push:
    paths:
      - 'contracts/**'
  pull_request:
    paths:
      - 'contracts/**'

jobs:
  test:
    name: Build & Test Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run tests
        working-directory: contracts/hvym-name-registry
        run: cargo test --verbose

      - name: Build WASM
        working-directory: contracts/hvym-name-registry
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Report WASM size
        run: |
          SIZE=$(wc -c < contracts/hvym-name-registry/target/wasm32-unknown-unknown/release/hvym_name_registry.wasm)
          echo "Contract WASM size: $SIZE bytes"
