<!DOCTYPE html>
<html>
<head>
  <title>Lepus Pelt Test (In-Browser)</title>
  <style>
    body { background: #1a1a2e; color: #e8e0d4; font-family: sans-serif; padding: 40px; }
    .test-card { padding: 32px; margin: 20px 0; min-height: 100px; }
    .no-pelt { background: #2a2a4e; border: 1px solid #444; border-radius: 8px; }
    #diagnostics { background: #000; color: #0f0; font-family: monospace; padding: 16px; margin: 20px 0; white-space: pre; font-size: 13px; border: 1px solid #333; }
  </style>
</head>
<body>
  <h1>Lepus Pelt Engine Test</h1>

  <div id="diagnostics">Running diagnostics...</div>

  <h2>1. Element with pelt attribute</h2>
  <pelt id="test-skin">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
      <rect width="400" height="200" rx="12" fill="#1a2a1a"/>
    </svg>
  </pelt>
  <div pelt="test-skin" class="test-card">
    <p>This div has pelt="test-skin".</p>
  </div>

  <h2>2. Normal CSS background (no pelt)</h2>
  <div class="test-card no-pelt">
    <p>Normal CSS background for comparison.</p>
  </div>

  <h2>3. Multiple pelted elements</h2>
  <div pelt="test-skin" class="test-card">
    <p>Card A with pelt="test-skin"</p>
  </div>
  <div pelt="test-skin" class="test-card">
    <p>Card B with pelt="test-skin"</p>
  </div>

  <script>
    const diag = document.getElementById('diagnostics');
    const lines = [];

    // Check 1: Is <pelt> recognized as HTMLPeltElement?
    const peltEl = document.querySelector('pelt');
    lines.push('=== Pelt Element Diagnostics ===');
    lines.push('pelt element found: ' + !!peltEl);
    if (peltEl) {
      lines.push('pelt constructor: ' + peltEl.constructor.name);
      lines.push('pelt tagName: ' + peltEl.tagName);
      lines.push('pelt id: ' + peltEl.id);
      lines.push('pelt.src property exists: ' + ('src' in peltEl));
      lines.push('pelt.scale property exists: ' + ('scale' in peltEl));
      lines.push('pelt display: ' + getComputedStyle(peltEl).display);
      lines.push('pelt innerHTML length: ' + peltEl.innerHTML.length);
      lines.push('pelt innerHTML preview: ' + peltEl.innerHTML.substring(0, 120));
      lines.push('pelt childElementCount: ' + peltEl.childElementCount);
      if (peltEl.firstElementChild) {
        lines.push('first child tag: ' + peltEl.firstElementChild.tagName);
      }
    }

    // Check 2: Elements with pelt attribute
    lines.push('');
    lines.push('=== Pelted Elements ===');
    const pelted = document.querySelectorAll('[pelt]');
    lines.push('elements with pelt attr: ' + pelted.length);
    pelted.forEach((el, i) => {
      lines.push('  [' + i + '] tag=' + el.tagName + ' pelt=' + el.getAttribute('pelt'));
    });

    // Check 3: Try WebIDL bindings
    lines.push('');
    lines.push('=== WebIDL Binding Test ===');
    if (peltEl) {
      try {
        peltEl.src = 'test.svg';
        lines.push('set peltEl.src = "test.svg" -> read back: ' + peltEl.src + ' (PASS)');
      } catch(e) {
        lines.push('peltEl.src setter FAILED: ' + e.message);
      }
      try {
        peltEl.scale = '9-slice';
        lines.push('set peltEl.scale = "9-slice" -> read back: ' + peltEl.scale + ' (PASS)');
      } catch(e) {
        lines.push('peltEl.scale setter FAILED: ' + e.message);
      }
    }

    diag.textContent = lines.join('\n');
  </script>
</body>
</html>
